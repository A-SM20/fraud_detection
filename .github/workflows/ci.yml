name: Fraud Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Lint & Test API ──────────────────────────────────
  test-api:
    name: Test API (Node.js)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: fraud_pass_ci
          POSTGRES_DB: fraud_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run database migrations
        env:
          PGPASSWORD: fraud_pass_ci
        run: psql -h localhost -U fraud_user -d fraud_pipeline -f db/migrations/001_initial_schema.sql

      - name: Run tests
        working-directory: api
        env:
          NODE_ENV: test
          SKIP_AUTH: 'true'
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost
          POSTGRES_USER: fraud_user
          POSTGRES_PASSWORD: fraud_pass_ci
          POSTGRES_DB: fraud_pipeline
        run: npm test

  # ─── Lint & Test Worker ───────────────────────────────
  test-worker:
    name: Test Worker (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: worker
        env:
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost
        run: python -m pytest tests/ -v --tb=short

  # ─── Build Docker Images ──────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: fraud-pipeline-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: fraud-pipeline-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: fraud-pipeline-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
