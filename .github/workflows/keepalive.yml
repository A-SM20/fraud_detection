name: Keep Render Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping (sleeps after 15m inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Service
        run: |
          if [ -z "${{ secrets.RENDER_API_URL }}" ]; then
            echo "RENDER_API_URL secret is not set, skipping API ping."
          else
            curl -sSf "${{ secrets.RENDER_API_URL }}/health" > /dev/null
            echo "API Ping successful!"
          fi

      - name: Ping Worker Service
        run: |
          if [ -z "${{ secrets.RENDER_WORKER_URL }}" ]; then
            echo "RENDER_WORKER_URL secret is not set, skipping Worker ping."
          else
            curl -sSf "${{ secrets.RENDER_WORKER_URL }}" > /dev/null
            echo "Worker Ping successful!"
          fi
